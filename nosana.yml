version: "1"
type: container

meta:
  trigger: api

global:
  image: docker.io/esvanth7/mindtune-eliza:latest
  env:
    - name: GROQ_API_KEY
      value: $GROQ_API_KEY
    - name: NOSANA_API_KEY
      value: $NOSANA_API_KEY
    - name: NOSANA_INFERENCE_URL
      value: https://inference.nosana.io/v1
    - name: PORT
      value: "3000"

ops:
  - id: run-mindtune-agent
    type: container/run
    args:
      cmd: ["node", "dist/index.js"]
      expose: 3000
      gpu: false
