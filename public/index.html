<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindTune — EEG AI Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a12;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 24px 32px;
      border-bottom: 1px solid #1e1e3a;
      display: flex;
      align-items: center;
      gap: 16px;
      background: #0d0d1a;
    }

    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6c63ff, #00d4ff);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    header h1 { font-size: 22px; font-weight: 700; color: #fff; }
    header p  { font-size: 13px; color: #7070a0; margin-top: 2px; }

    .badge {
      margin-left: auto;
      background: #1a1a2e;
      border: 1px solid #6c63ff44;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      color: #6c63ff;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      max-height: calc(100vh - 80px);
    }

    /* LEFT PANEL */
    .panel {
      background: #0d0d1a;
      border-right: 1px solid #1e1e3a;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #7070a0; margin-bottom: 4px; }

    .eeg-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .eeg-field label {
      display: block;
      font-size: 12px;
      color: #9090b0;
      margin-bottom: 4px;
    }

    .eeg-field input {
      width: 100%;
      background: #13132a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e0e0f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .eeg-field input:focus { border-color: #6c63ff; }

    .stress-bar { margin-top: 4px; }
    .stress-bar label { font-size: 12px; color: #9090b0; margin-bottom: 6px; display: block; }
    .stress-row { display: flex; gap: 8px; }
    .stress-btn {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      background: #13132a;
      color: #9090b0;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .stress-btn.active   { background: #6c63ff22; border-color: #6c63ff; color: #6c63ff; font-weight: 600; }
    .stress-btn:hover:not(.active) { border-color: #4a4a6a; }

    .quick-btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      background: #13132a;
      color: #c0c0e0;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      margin-bottom: 6px;
    }
    .quick-btn:hover { border-color: #6c63ff44; background: #16163a; }
    .quick-btn span { display: block; font-size: 11px; color: #6060a0; margin-top: 2px; }

    .ratios {
      background: #13132a;
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ratio-row { display: flex; justify-content: space-between; align-items: center; }
    .ratio-label { font-size: 12px; color: #9090b0; }
    .ratio-value { font-size: 14px; font-weight: 600; font-family: monospace; }
    .ratio-value.warn { color: #ff6b6b; }
    .ratio-value.ok   { color: #51cf66; }

    .ratio-bar-bg { height: 4px; background: #1e1e3a; border-radius: 2px; margin-top: 4px; }
    .ratio-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

    .send-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6c63ff, #5a54e0);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* RIGHT PANEL — CHAT */
    .chat-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 75%;
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: #6c63ff22;
      border: 1px solid #6c63ff44;
      color: #c0c0f0;
    }

    .msg.agent {
      align-self: flex-start;
      background: #13132a;
      border: 1px solid #1e1e3a;
      color: #e0e0f0;
    }

    .msg.agent strong { color: #6c63ff; }
    .msg.agent code {
      background: #1e1e3a;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
      color: #00d4ff;
    }

    .msg-meta { font-size: 11px; color: #5050a0; margin-top: 6px; }

    .typing {
      align-self: flex-start;
      background: #13132a;
      border: 1px solid #1e1e3a;
      border-radius: 14px;
      padding: 14px 18px;
      display: none;
    }

    .typing span {
      display: inline-block;
      width: 6px; height: 6px;
      background: #6c63ff;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .chat-input-row {
      padding: 16px 24px;
      border-top: 1px solid #1e1e3a;
      display: flex;
      gap: 10px;
      background: #0d0d1a;
    }

    .chat-input {
      flex: 1;
      background: #13132a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e0e0f0;
      font-size: 14px;
      outline: none;
      resize: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .chat-input:focus { border-color: #6c63ff; }

    .chat-send {
      background: #6c63ff;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .chat-send:hover { opacity: 0.85; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #4040a0;
      gap: 10px;
    }
    .empty-state .icon { font-size: 48px; }
    .empty-state p { font-size: 14px; }

    /* feedback buttons */
    .feedback-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .fb-btn {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      background: #13132a;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .fb-btn.win { color: #51cf66; }
    .fb-btn.fail { color: #ff6b6b; }
    .fb-btn:hover { border-color: currentColor; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🧠</div>
  <div>
    <h1>MindTune</h1>
    <p>EEG-Adaptive AI Music Agent · Powered by ElizaOS + Nosana</p>
  </div>
  <div class="badge" id="statusBadge">● Connecting…</div>
</header>

<main>
  <!-- LEFT: EEG Input Panel -->
  <div class="panel">
    <div>
      <h2>EEG Input</h2>
      <div class="eeg-grid" style="margin-top:12px;">
        <div class="eeg-field">
          <label>Delta (δ) 0.5–4 Hz</label>
          <input type="number" id="delta" value="0.5" step="0.01" min="0" max="1" />
        </div>
        <div class="eeg-field">
          <label>Theta (θ) 4–8 Hz</label>
          <input type="number" id="theta" value="0.5" step="0.01" min="0" max="1" />
        </div>
        <div class="eeg-field">
          <label>Alpha (α) 8–12 Hz</label>
          <input type="number" id="alpha" value="0.5" step="0.01" min="0" max="1" />
        </div>
        <div class="eeg-field">
          <label>Beta (β) 13–30 Hz</label>
          <input type="number" id="beta" value="0.5" step="0.01" min="0" max="1" />
        </div>
        <div class="eeg-field">
          <label>Gamma (γ) 30+ Hz</label>
          <input type="number" id="gamma" value="0.5" step="0.01" min="0" max="1" />
        </div>
      </div>
    </div>

    <div class="stress-bar">
      <label>Stress Score</label>
      <div class="stress-row" id="stressRow">
        <div class="stress-btn" data-val="0" onclick="setStress(0)">0</div>
        <div class="stress-btn" data-val="1" onclick="setStress(1)">1</div>
        <div class="stress-btn" data-val="2" onclick="setStress(2)">2</div>
        <div class="stress-btn active" data-val="3" onclick="setStress(3)">3</div>
        <div class="stress-btn" data-val="4" onclick="setStress(4)">4</div>
        <div class="stress-btn" data-val="5" onclick="setStress(5)">5</div>
      </div>
    </div>

    <div class="ratios" id="ratioDisplay">
      <h2>Live Ratios</h2>
      <div class="ratio-row">
        <span class="ratio-label">Theta/Beta (Focus marker)</span>
        <span class="ratio-value" id="tbRatio">–</span>
      </div>
      <div class="ratio-bar-bg"><div class="ratio-bar-fill" id="tbBar" style="width:0%;background:#6c63ff;"></div></div>
      <div class="ratio-row" style="margin-top:6px;">
        <span class="ratio-label">Alpha/Beta (Calm marker)</span>
        <span class="ratio-value" id="abRatio">–</span>
      </div>
      <div class="ratio-bar-bg"><div class="ratio-bar-fill" id="abBar" style="width:0%;background:#00d4ff;"></div></div>
    </div>

    <button class="send-btn" onclick="analyzeAndRecommend()">
      Analyze EEG + Get Music
    </button>

    <div>
      <h2 style="margin-bottom:10px;">Quick Scenarios</h2>
      <button class="quick-btn" onclick="loadScenario('stressed')">
        😰 Stressed State
        <span>Stress 4/5 · High Beta · Suppressed Alpha</span>
      </button>
      <button class="quick-btn" onclick="loadScenario('unfocused')">
        😶 Unfocused / Mind-wandering
        <span>High Theta/Beta ratio · Can't concentrate</span>
      </button>
      <button class="quick-btn" onclick="loadScenario('relaxed')">
        😌 Relaxed State
        <span>Good Alpha dominance · Low stress</span>
      </button>
    </div>
  </div>

  <!-- RIGHT: Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="icon">🧠</div>
        <p>Set your EEG values and click <strong>Analyze EEG + Get Music</strong></p>
        <p style="font-size:12px;color:#3030a0;">or type a message below</p>
      </div>
    </div>
    <div class="typing" id="typing">
      <span></span><span></span><span></span>
    </div>
    <div class="chat-input-row">
      <textarea class="chat-input" id="chatInput" rows="1"
        placeholder="Ask MindTune anything… or type 'win' / 'fail' after listening"
        onkeydown="handleKey(event)"></textarea>
      <button class="chat-send" onclick="sendText()">➤</button>
    </div>
  </div>
</main>

<script>
  const API_BASE = 'http://localhost:3000';
  let agentId = null;
  let stressScore = 3;
  let lastMsgWasRecommendation = false;

  // ── Connect to agent ──
  async function connect() {
    try {
      const r = await fetch(`${API_BASE}/agent`);
      const data = await r.json();
      if (data.id) {
        agentId = data.id;
        document.getElementById('statusBadge').textContent = '● Online';
        document.getElementById('statusBadge').style.color = '#51cf66';
      }
    } catch {
      document.getElementById('statusBadge').textContent = '● Offline';
      document.getElementById('statusBadge').style.color = '#ff6b6b';
    }
  }

  // ── Stress buttons ──
  function setStress(val) {
    stressScore = val;
    document.querySelectorAll('.stress-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.val) === val);
    });
    updateRatios();
  }

  // ── Live ratio display ──
  function updateRatios() {
    const theta = parseFloat(document.getElementById('theta').value) || 0;
    const alpha = parseFloat(document.getElementById('alpha').value) || 0;
    const beta  = parseFloat(document.getElementById('beta').value)  || 0.01;

    const tb = (theta / beta).toFixed(2);
    const ab = (alpha / beta).toFixed(2);

    const tbEl = document.getElementById('tbRatio');
    tbEl.textContent = tb;
    tbEl.className = 'ratio-value ' + (parseFloat(tb) > 2.5 ? 'warn' : 'ok');
    document.getElementById('tbBar').style.width = Math.min(parseFloat(tb) / 5 * 100, 100) + '%';

    const abEl = document.getElementById('abRatio');
    abEl.textContent = ab;
    abEl.className = 'ratio-value ' + (parseFloat(ab) > 1.0 ? 'ok' : 'warn');
    document.getElementById('abBar').style.width = Math.min(parseFloat(ab) / 3 * 100, 100) + '%';
  }

  ['delta','theta','alpha','beta','gamma'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateRatios);
  });

  // ── Quick scenarios ──
  function loadScenario(type) {
    if (type === 'stressed') {
      document.getElementById('delta').value = 0.4;
      document.getElementById('theta').value = 0.5;
      document.getElementById('alpha').value = 0.25;
      document.getElementById('beta').value  = 0.85;
      document.getElementById('gamma').value = 0.6;
      setStress(4);
    } else if (type === 'unfocused') {
      document.getElementById('delta').value = 0.5;
      document.getElementById('theta').value = 0.78;
      document.getElementById('alpha').value = 0.45;
      document.getElementById('beta').value  = 0.28;
      document.getElementById('gamma').value = 0.3;
      setStress(1);
    } else if (type === 'relaxed') {
      document.getElementById('delta').value = 0.4;
      document.getElementById('theta').value = 0.4;
      document.getElementById('alpha').value = 0.72;
      document.getElementById('beta').value  = 0.35;
      document.getElementById('gamma').value = 0.2;
      setStress(0);
    }
    updateRatios();
  }

  // ── Build message from EEG inputs ──
  function buildEEGMessage() {
    const delta = document.getElementById('delta').value;
    const theta = document.getElementById('theta').value;
    const alpha = document.getElementById('alpha').value;
    const beta  = document.getElementById('beta').value;
    const gamma = document.getElementById('gamma').value;
    return `EEG data: stress score ${stressScore}, delta ${delta}, theta ${theta}, alpha ${alpha}, beta ${beta}, gamma ${gamma}. Please analyze my mental state and recommend music.`;
  }

  // ── Send EEG + recommend ──
  async function analyzeAndRecommend() {
    const msg = buildEEGMessage();
    await sendMessage(msg);
    lastMsgWasRecommendation = true;
  }

  // ── Chat send ──
  async function sendText() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    await sendMessage(text);
    lastMsgWasRecommendation = false;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendText();
    }
  }

  // ── Core send/receive ──
  async function sendMessage(text) {
    if (!agentId) { addMessage('agent', 'Agent not connected. Is the server running?'); return; }

    document.getElementById('emptyState')?.remove();
    addMessage('user', text);
    showTyping(true);

    try {
      const r = await fetch(`${API_BASE}/${agentId}/message`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, userId: 'user', userName: 'User' }),
      });
      const data = await r.json();
      showTyping(false);

      const reply = Array.isArray(data) ? data[0]?.text : data.text;
      if (reply) {
        addMessage('agent', reply, lastMsgWasRecommendation);
      }
    } catch (err) {
      showTyping(false);
      addMessage('agent', 'Error reaching agent: ' + err.message);
    }
  }

  function addMessage(role, text, showFeedback = false) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = formatText(text);

    if (role === 'agent') {
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.textContent = 'MindTune · ' + new Date().toLocaleTimeString();
      div.appendChild(meta);
    }

    if (showFeedback && role === 'agent') {
      const fbRow = document.createElement('div');
      fbRow.className = 'feedback-row';
      fbRow.innerHTML = `
        <button class="fb-btn win" onclick="sendFeedback('win', this)">✓ It helped (win)</button>
        <button class="fb-btn fail" onclick="sendFeedback('fail', this)">✗ Didn't help (fail)</button>
      `;
      div.appendChild(fbRow);
    }

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  async function sendFeedback(outcome, btn) {
    btn.closest('.feedback-row').remove();
    await sendMessage(outcome);
  }

  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.*?)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');
  }

  function showTyping(show) {
    const t = document.getElementById('typing');
    t.style.display = show ? 'block' : 'none';
    if (show) document.getElementById('messages').scrollTop = 9999;
  }

  // ── Init ──
  updateRatios();
  connect();
</script>
</body>
</html>
